name: financial-news-triage
version: 1.0.0
description: Deterministic financial news triage environment where agents classify market relevance, sector impact, urgency, and action from realistic financial headlines.
entrypoint: app.py

tasks:
  - id: triage_easy
    name: Easy Financial Triage
    difficulty: easy
    description: Classify straightforward market headlines into relevance, sector, urgency, and action.
    max_steps: 8
  - id: triage_medium
    name: Medium Financial Triage
    difficulty: medium
    description: Classify nuanced headlines with mixed or partially offsetting financial signals.
    max_steps: 8
  - id: triage_hard
    name: Hard Financial Triage
    difficulty: hard
    description: Classify complex macro and multi-factor headlines where signals can conflict.
    max_steps: 8

metadata:
  domain: finance
  environment_type: deterministic
  interaction_mode: step_based
  reward_range: [0.0, 1.0]
